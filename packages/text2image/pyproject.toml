[project]
name = "text2image"
version = "0.1.0"
description = "Text to image generation pipeline"
requires-python = ">=3.10"
dependencies = [
    "aiservices-core",
    "mflux>=0.17.5",
    "mlx>=0.31.0",
    "numpy>=1.24.0",
    "pillow>=10.0.0",
    "pydantic>=2.0.0",
    "typer>=0.12.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
text2image = "text2image.cli:app"

[tool.uv.sources]
aiservices-core = { workspace = true }
image2image = { workspace = true }
