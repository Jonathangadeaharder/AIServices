[project]
name = "text2image"
version = "0.1.0"
description = "Text to image generation pipeline"
requires-python = ">=3.10"
dependencies = [
    "aiservices-core",
    "diffusers>=0.27.0",
    "transformers>=4.38.0",
    "accelerate>=0.28.0",
    "replicate>=0.25.0",
    "torch>=2.0.0",
    "requests>=2.31.0",
    "pillow>=10.0.0",
    "pydantic>=2.0.0",
    "typer>=0.12.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
text2image = "text2image.cli:app"

[tool.uv.sources]
aiservices-core = { workspace = true }
