[project]
name = "subtitle-translate"
version = "0.1.0"
description = "Translate SRT subtitle files using CTranslate2 MarianMT"
requires-python = ">=3.10"
dependencies = [
    "aiservices-core",
    "pydantic>=2.0.0",
    "typer>=0.12.0",
    "pysrt>=1.1.0",
]

[project.optional-dependencies]
translate = [
    "ctranslate2>=4.0.0",
    "transformers>=4.30.0",
    "sentencepiece>=0.1.99",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
subtitle-translate = "subtitle_translate.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/subtitle_translate"]

[tool.uv.sources]
aiservices-core = { workspace = true }
