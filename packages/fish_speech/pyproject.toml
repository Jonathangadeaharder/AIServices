[project]
name = "fish-speech-core"
version = "2.0.0"
description = "Core fish-speech logic"
requires-python = ">=3.10"
dependencies = [
    "torch",
    "transformers",
    "einops",
    "lightning",
    "hydra-core",
    "kui",
    "msgpack",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fish_speech"]
