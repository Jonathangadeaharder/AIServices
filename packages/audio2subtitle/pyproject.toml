[project]
name = "audio2subtitle"
version = "0.2.0"
description = "Audio to subtitle (SRT/VTT) transcription pipeline with optional filtering and translation"
requires-python = ">=3.10"
dependencies = [
    "aiservices-core",
    "mlx-whisper>=0.4.3",
    "pydantic>=2.0.0",
    "typer>=0.12.0",
]

[project.optional-dependencies]
filter = [
    "spacy>=3.0.0",
    "pandas>=2.0.0",
]
translate = [
    "ctranslate2>=4.0.0",
    "transformers>=4.30.0",
    "sentencepiece>=0.1.99",
]
all = [
    "audio2subtitle[filter,translate]",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
audio2subtitle = "audio2subtitle.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/audio2subtitle"]

[tool.uv.sources]
aiservices-core = { workspace = true }
