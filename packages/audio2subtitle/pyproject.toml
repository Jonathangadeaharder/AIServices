[project]
name = "audio2subtitle"
version = "0.1.0"
description = "Audio to subtitle (SRT/VTT) transcription pipeline"
requires-python = ">=3.10"
dependencies = [
    "aiservices-core",
    "mlx-whisper>=0.4.3",
    "pydantic>=2.0.0",
    "typer>=0.12.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
audio2subtitle = "audio2subtitle.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/audio2subtitle"]

[tool.uv.sources]
aiservices-core = { workspace = true }
