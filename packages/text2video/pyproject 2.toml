[project]
name = "text2video"
version = "0.1.0"
description = "Text to video generation pipeline"
requires-python = ">=3.10"
dependencies = [
    "aiservices-core",
    "replicate>=0.25.0",
    "requests>=2.31.0",
    "pillow>=10.0.0",
    "pydantic>=2.0.0",
    "typer>=0.12.0",
    "ltx-pipelines-mlx",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
text2video = "text2video.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/text2video"]

[tool.uv.sources]
aiservices-core = { workspace = true }
ltx-pipelines-mlx = { workspace = true }
ltx-core-mlx = { workspace = true }
