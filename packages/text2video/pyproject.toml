[project]
name = "text2video"
version = "0.1.0"
description = "Text to video generation pipeline"
requires-python = ">=3.10"
dependencies = [
    "aiservices-core",
    "pydantic>=2.0.0",
    "typer>=0.12.0",
    "ltx-pipelines-mlx",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
text2video = "text2video.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/text2video"]

[tool.uv.sources]
aiservices-core = { workspace = true }
ltx-core-mlx = { git = "https://github.com/dgrauet/ltx-2-mlx", subdirectory = "packages/ltx-core-mlx", rev = "ae8f095f4c245de72f6a74b90021c827ffef8ff1" }
ltx-pipelines-mlx = { git = "https://github.com/dgrauet/ltx-2-mlx", subdirectory = "packages/ltx-pipelines-mlx", rev = "ae8f095f4c245de72f6a74b90021c827ffef8ff1" }
