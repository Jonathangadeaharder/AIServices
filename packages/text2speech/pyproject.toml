[project]
name = "text2speech"
version = "0.1.0"
description = "Text to speech generation module"
requires-python = ">=3.10"
dependencies = [
    "aiservices-core",
    "pydantic>=2.0.0",
    "typer>=0.12.0",
    "ormsgpack>=1.12.2",
]

[project.optional-dependencies]
mlx = ["mlx-audio>=0.4.0", "soundfile"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
text2speech = "text2speech.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/text2speech"]

[tool.uv.sources]
aiservices-core = { workspace = true }
