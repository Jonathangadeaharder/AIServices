[project]
name = "text2speech"
version = "0.1.0"
description = "Text to speech generation module"
requires-python = ">=3.10"
dependencies = [
    "aiservices-core",
    "pydantic>=2.0.0",
    "typer>=0.12.0",
    "torch>=2.0.0",
    "torchaudio",
    "transformers",
    "lightning",
    "hydra-core",
    "einops",
    "librosa",
    "resampy",
    "pydub",
    "fish-speech-core",
    "ormsgpack>=1.12.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
text2speech = "text2speech.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/text2speech"]

[tool.uv.sources]
aiservices-core = { workspace = true }
ltx-pipelines-mlx = { workspace = true }
ltx-core-mlx = { workspace = true }
fish-speech-core = { workspace = true }
