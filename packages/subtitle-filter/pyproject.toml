[project]
name = "subtitle-filter"
version = "0.1.0"
description = "Filter SRT subtitle segments by vocabulary level using spaCy"
requires-python = ">=3.10"
dependencies = [
    "aiservices-core",
    "pydantic>=2.0.0",
    "typer>=0.12.0",
    "pysrt>=1.1.0",
]

[project.optional-dependencies]
filter = [
    "spacy>=3.0.0",
    "pandas>=2.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
subtitle-filter = "subtitle_filter.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/subtitle_filter"]

[tool.uv.sources]
aiservices-core = { workspace = true }
