[project]
name = "video2subtitle"
version = "0.1.0"
description = "Video to subtitle (SRT/VTT) transcription pipeline"
requires-python = ">=3.10"
dependencies = [
    "aiservices-core",
    "pydantic>=2.0.0",
    "typer>=0.12.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
video2subtitle = "video2subtitle.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/video2subtitle"]

[tool.uv.sources]
aiservices-core = { workspace = true }
