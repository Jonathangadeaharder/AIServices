[project]
name = "speech2text"
version = "0.1.0"
description = "Speech to text transcription module"
requires-python = ">=3.10"
dependencies = [
    "aiservices-core",
    "mlx-whisper>=0.4.3",
    "pydantic>=2.0.0",
    "typer>=0.12.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
speech2text = "speech2text.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/speech2text"]

[tool.uv.sources]
aiservices-core = { workspace = true }
