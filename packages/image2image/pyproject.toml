[project]
name = "image2image"
version = "0.1.0"
description = "Image to image generation pipeline"
requires-python = ">=3.10"
dependencies = [
    "aiservices-core",
    "diffusers>=0.27.0",
    "transformers>=4.38.0",
    "accelerate>=0.28.0",
    "replicate>=0.25.0",
    "torch>=2.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
image2image = "image2image.cli:app"

[tool.uv.sources]
aiservices-core = { workspace = true }
