[project]
name = "image2image"
version = "0.1.0"
description = "Image to image generation pipeline"
requires-python = ">=3.10"
dependencies = [
    "aiservices-core",
    "replicate>=0.25.0",
    "requests>=2.31.0",
    "pillow>=10.0.0",
    "pydantic>=2.0.0",
    "typer>=0.12.0",
]

[project.optional-dependencies]
mlx = [
    "mlx>=0.31.0",
    "safetensors>=0.4.0",
    "huggingface_hub>=0.20.0",
    "numpy>=1.24.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
image2image = "image2image.cli:app"

[tool.uv.sources]
aiservices-core = { workspace = true }
