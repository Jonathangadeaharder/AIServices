[project]
name = "aiservices-core"
version = "0.1.0"
description = "Core utilities for AIServices"
requires-python = ">=3.10"
dependencies = [
    "pydantic-settings>=2.0.0",
    "typer>=0.12.0",
    "rich>=13.0.0",
    "tenacity>=9.0.0",
    "Pillow>=10.0.0",
    "numpy>=1.24.0",
    "requests>=2.31.0",
    "websocket-client>=1.7.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
