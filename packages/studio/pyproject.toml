[project]
name = "studio"
version = "0.1.0"
description = "Showrunner orchestrator for AIServices"
requires-python = ">=3.11"
dependencies = [
    "aiservices-core",
    "text2speech",
    "text2video",
    "pydantic>=2.0.0",
    "typer>=0.12.0",
    "ffmpeg-python",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
studio = "studio.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/studio"]

[tool.uv.sources]
aiservices-core = { workspace = true }
text2speech = { workspace = true }
text2video = { workspace = true }
