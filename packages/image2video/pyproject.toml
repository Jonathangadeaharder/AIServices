[project]
name = "image2video"
version = "0.1.0"
description = "Image to video generation pipeline"
requires-python = ">=3.10"
dependencies = [
    "aiservices-core",
    "pillow>=10.0.0",
    "pydantic>=2.0.0",
    "typer>=0.12.0",
    "ltx-pipelines-mlx",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
image2video = "image2video.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/image2video"]

[tool.uv.sources]
aiservices-core = { workspace = true }
ltx-core-mlx = { git = "https://github.com/dgrauet/ltx-2-mlx", subdirectory = "packages/ltx-core-mlx" }
ltx-pipelines-mlx = { git = "https://github.com/dgrauet/ltx-2-mlx", subdirectory = "packages/ltx-pipelines-mlx" }
