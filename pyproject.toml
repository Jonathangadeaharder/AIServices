[project]
name = "aiservices-workspace"
version = "0.1.0"
description = "AI Services Monorepo Workspace"
requires-python = ">=3.11"
dependencies = []

[tool.uv]
managed = true

[tool.uv.workspace]
members = ["packages/*"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "N", "C", "B"]
ignore = []

[tool.pyright]
pythonVersion = "3.11"
pythonPlatform = "All"
typeCheckingMode = "basic"
venvPath = "."
venv = ".venv"
reportPrivateImportUsage = "none"
reportAttributeAccessIssue = "none"
reportCallIssue = "none"

[tool.pytest.ini_options]
pythonpath = [
    "packages/aiservices_core/src",
    "packages/image2image/src",
    "packages/speech2text/src",
    "packages/text2video/src",
]

[dependency-groups]
dev = [
    "copier>=9.14.3",
    "pyright>=1.1.409",
    "pytest>=9.0.3",
    "ruff>=0.15.12",
]
